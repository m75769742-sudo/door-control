<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Контроль Табло</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #1a1a1a; color: white; }
        .container { width: 90%; max-width: 400px; display: flex; flex-direction: column; gap: 15px; }
        button { width: 100%; padding: 25px; font-size: 1.4rem; font-weight: bold; cursor: pointer; border: none; border-radius: 15px; color: white; transition: 0.2s; }
        .free { background: #28a745; }
        .back-soon { background: #fd7e14; }
        .remote { background: #6f42c1; }
        button:active { transform: scale(0.96); opacity: 0.9; }
        #status { margin-top: 20px; text-align: center; font-size: 1.1rem; height: 24px; }
    </style>
</head>
<body>

    <div class="container">
        <button class="free" onclick="sendUpdate('Away')">СВОБОДНО</button>
        <button class="back-soon" onclick="sendUpdate('Back Soon')">СКОРО БУДУ</button>
        <button class="remote" onclick="sendUpdate('Working Remotely')">УДАЛЕННО</button>
        <div id="status"></div>
    </div>

    <script>
        // ВНИМАНИЕ: Вставьте свой API Key между кавычек ниже
        const API_KEY = '2LaZR81dZ_i0tLzJf6P6ri32S2mR_GHJc89J4yeMVC97AlT3ztmCAfZwOGyLSHCQ'; 
        const SCREEN_ID = '712658';

        async function sendUpdate(contentName) {
            const statusDiv = document.getElementById('status');
            statusDiv.style.color = "white";
            statusDiv.innerText = 'Отправка...';

            // Используем прокси для обхода CORS
            const proxy = 'https://corsproxy.io/?';
            const targetUrl = `https://app.yodeck.com/api/v1/screens/${SCREEN_ID}/`;
            const finalUrl = proxy + encodeURIComponent(targetUrl);

            try {
                const response = await fetch(finalUrl, {
                    method: 'PATCH',
                    headers: {
                        'X-API-Key': API_KEY,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ "content": contentName })
                });

                if (response.ok) {
                    statusDiv.style.color = "#28a745";
                    statusDiv.innerText = 'Успешно! Видео меняется.';
                } else {
                    statusDiv.style.color = "#dc3545";
                    statusDiv.innerText = 'Ошибка API: ' + response.status;
                }
            } catch (error) {
                statusDiv.style.color = "#dc3545";
                statusDiv.innerText = 'Ошибка соединения';
            }
        }
    </script>
</body>
</html>
