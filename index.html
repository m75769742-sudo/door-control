<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Контроль Табло</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #1a1a1a; color: white; padding: 20px; }
        .container { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 10px; }
        button { width: 100%; padding: 20px; font-size: 1.2rem; font-weight: bold; cursor: pointer; border: none; border-radius: 12px; color: white; }
        .free { background: #28a745; }
        .back-soon { background: #fd7e14; }
        .remote { background: #6f42c1; }
        .diag { background: #555; margin-top: 20px; font-size: 0.9rem; }
        #status { margin-top: 20px; text-align: center; font-size: 0.9rem; white-space: pre-wrap; word-break: break-all; }
    </style>
</head>
<body>

    <div class="container">
        <button class="free" onclick="sendUpdate('Away')">СВОБОДНО</button>
        <button class="back-soon" onclick="sendUpdate('Back Soon')">СКОРО БУДУ</button>
        <button class="remote" onclick="sendUpdate('Working Remotely')">УДАЛЕННО</button>
        
        <button class="diag" onclick="getIds()">🔍 ДИАГНОСТИКА (Найти ID)</button>
        
        <div id="status">Нажмите кнопку</div>
    </div>

    <script>
        const API_KEY = '2LaZR81dZ_i0tLzJf6P6ri32S2mR_GHJc89J4yeMVC97AlT3ztmCAfZwOGyLSHCQ'; 
        const SCREEN_ID = '712658';

        async function sendUpdate(name) {
            const statusDiv = document.getElementById('status');
            statusDiv.innerText = 'Отправка...';
            // Пробуем через надежный прокси
            const url = `https://corsproxy.io/?${encodeURIComponent(`https://app.yodeck.com/api/v1/screens/${SCREEN_ID}/`)}`;
            
            try {
                const response = await fetch(url, {
                    method: 'PATCH',
                    headers: { 'X-API-Key': API_KEY, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ "content": name })
                });
                statusDiv.innerText = response.ok ? 'Успешно!' : 'Ошибка API: ' + response.status;
            } catch (e) { statusDiv.innerText = 'Ошибка сети'; }
        }

        async function getIds() {
            const statusDiv = document.getElementById('status');
            statusDiv.innerText = 'Получаю список медиа...';
            const url = `https://corsproxy.io/?${encodeURIComponent('https://app.yodeck.com/api/v1/media/')}`;
            
            try {
                const response = await fetch(url, {
                    headers: { 'X-API-Key': API_KEY }
                });
                const data = await response.json();
                let info = "ВАШИ ID:\n";
                data.results.forEach(m => {
                    info += `${m.name}: ID=${m.id}\n`;
                });
                statusDiv.innerText = info;
            } catch (e) { statusDiv.innerText = 'Не удалось получить ID. Проверьте ключ.'; }
        }
    </script>
</body>
</html>
