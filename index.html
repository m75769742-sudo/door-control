<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пульт: Дверь Кабинета</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #121212; color: white; }
        .container { width: 90%; max-width: 400px; display: flex; flex-direction: column; gap: 15px; }
        button { width: 100%; padding: 30px; font-size: 1.5rem; font-weight: bold; cursor: pointer; border: none; border-radius: 20px; color: white; transition: 0.2s; }
        .btn-away { background: #28a745; }
        .btn-soon { background: #fd7e14; }
        .btn-remote { background: #6f42c1; }
        button:active { transform: scale(0.95); opacity: 0.8; }
        #status { margin-top: 25px; font-size: 1.1rem; text-align: center; min-height: 30px; }
    </style>
</head>
<body>

    <div class="container">
        <button class="btn-away" onclick="send('Away')">СВОБОДНО</button>
        <button class="btn-soon" onclick="send('Back Soon')">СКОРО БУДУ</button>
        <button class="btn-remote" onclick="send('Working Remotely')">УДАЛЕННО</button>
        <div id="status">Система готова</div>
    </div>

    <script>
        async function send(contentName) {
            const status = document.getElementById('status');
            status.style.color = "white";
            status.innerText = 'Отправка команды...';

            // ВСТАВЬТЕ ВАШУ ССЫЛКУ ИЗ GOOGLE МЕЖДУ КАВЫЧЕК
            const webAppUrl = 'https://script.google.com/macros/s/AKfycbwNZHCy7m6KtZF5wcb3S5Yfry2ZZZUYZA3npnRanRhEdpdwf4eQvVKceBv0MQoR02uS/exec';

            try {
                const response = await fetch(webAppUrl + '?content=' + encodeURIComponent(contentName));
                if (response.ok) {
                    status.style.color = "#28a745";
                    status.innerText = 'УСПЕШНО! Видео меняется.';
                } else {
                    status.style.color = "#dc3545";
                    status.innerText = 'Ошибка скрипта';
                }
            } catch (e) {
                status.style.color = "#dc3545";
                status.innerText = 'Ошибка сети';
            }
        }
    </script>
</body>
</html>
